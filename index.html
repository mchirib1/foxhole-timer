<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workout Timer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <div id="state" class="work">WORK</div>
    <div id="time">05:00</div>

    <div id="controls">
      <button id="startBtn" tabindex="0">START</button>
      <button id="pauseBtn" tabindex="0">PAUSE</button>
      <button id="resetBtn" tabindex="0">RESET</button>
    </div>
  </div>

  <audio id="beep" preload="auto">
    <source src="beep.mp3">
  </audio>

  <script src="app.js"></script>
</body>
</html>
